experiment:
  name: legacy_fullvideo_emotion_token_tinyllama_siglip_lora_rtx4060_8gb
  seed: 42
  output_dir: outputs/emotion_token_tinyllama_siglip_lora_rtx4060_8gb

model:
  llm:
    name_or_path: TinyLlama/TinyLlama-1.1B-Chat-v1.0
    use_lora: true
    local_files_only: true
    lora_r: 8
    lora_alpha: 16
    lora_modules: "model.*(q_proj|v_proj|o_proj|gate_proj|up_proj|down_proj)$"
    attn_implementation: sdpa
  vision_encoder:
    name_or_path: google/siglip-large-patch16-384
    freeze: true
    feature_dir: data/processed/features/siglip_large_384_2fps_1plus3x3
    frame_size: 384
    frame_token_cls: true
    frame_token_pooled: [3, 3]
    frame_num_tokens: 10
  projector:
    type: mlp
    input_size: 1024
    hidden_size: 1024
    output_size: 2048
  audio_encoder:
    enabled: false

data:
  train_manifest: data/manifests/feature_subset/train.jsonl
  val_manifest: data/manifests/feature_subset/val.jsonl
  test_manifest: data/manifests/feature_subset/test.jsonl
  feature_dir: data/processed/features/siglip_large_384_2fps_1plus3x3
  streaming_window:
    mode: full_video
    max_num_frames: 64
    stride: null
    fps: 2.0
  task:
    type: open_vocab_emotion_token_prediction
    target: emotion
    use_reasoning: false
    label_scheme: open_vocabulary

training:
  batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-4
  num_epochs: 3
  max_steps: -1
  precision: bf16
  optim: adamw_torch
  gradient_checkpointing: true
  save_steps: 100
  save_total_limit: 3
  logging_steps: 10
  report_to: none

inference:
  max_new_tokens: 8
  trigger_policy: disabled_for_baseline
